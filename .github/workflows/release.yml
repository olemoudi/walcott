name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK to a stable asset name
        run: cp app/build/outputs/apk/release/app-release.apk walcott-alpha.apk

      - name: Build version.json (drives in-app auto-update)
        run: |
          VC=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          VN=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          printf '{"versionCode": %s, "versionName": "%s", "apk": "%s"}\n' \
            "$VC" "$VN" "https://github.com/olemoudi/walcott/releases/latest/download/walcott-alpha.apk" > version.json
          cat version.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            walcott-alpha.apk
            version.json
          fail_on_unmatched_files: true
          generate_release_notes: true
